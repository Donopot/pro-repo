name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          sudo apt-get install -y html5validator 2>/dev/null || true
          # Basic HTML check: ensure all tags are balanced, no broken structure
          python3 -c "
          import re, sys
          html = open('site/index.html').read()
          # Check balanced tags (crude but catches most issues)
          tags = re.findall(r'<(/?\w+)', html)
          stack = []
          void_elements = {'meta','link','img','input','br','hr'}
          for tag in tags:
              if tag.startswith('/'):
                  if not stack:
                      print(f'ERROR: Closing tag </{tag[1:]}> without opening tag')
                      sys.exit(1)
                  expected = stack.pop()
                  if expected != tag[1:]:
                      print(f'ERROR: Expected </{expected}>, found </{tag[1:]}>')
              elif tag not in void_elements:
                  stack.insert(0, tag)
          if stack:
              print(f'WARNING: Unclosed tags: {stack}')
          else:
              print('✅ HTML structure valid')
          "

      - name: Check for unreplaced placeholders
        run: |
          echo "=== Checking for unreplaced [placeholders] ==="
          PLACEHOLDERS=$(grep -rn '\[À compléter\]\|\[JJ/MM/AAAA\]\|\[Raison sociale\]\|\[X\]' templates/ site/ README.md 2>/dev/null || true)
          if [ -n "$PLACEHOLDERS" ]; then
            echo "ℹ️  Placeholders found (expected in templates — verify before client delivery):"
            echo "$PLACEHOLDERS"
          else
            echo "✅ No placeholders"
          fi

      - name: Check dead links
        run: |
          echo "=== Checking links in Markdown files ==="
          # Extract HTTP/HTTPS URLs and check them
          URLS=$(grep -rohP 'https?://[^\s\)]+' templates/ site/ README.md AGENTS.md 2>/dev/null | sort -u || true)
          DEAD=0
          for url in $URLS; do
            # Skip placeholder URLs
            case "$url" in
              *calendly.com/donopot*|*linkedin.com/in/donopot*) continue ;;
              *github.com/Donopot*|*cnil.fr*|*service-public.fr*|*legifrance*|*insee.fr*) continue ;;
              *donopot@*|*.pm.me) continue ;;
            esac
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$url" 2>/dev/null || echo "000")
            if [ "$STATUS" = "000" ] || [ "$STATUS" -ge 400 ]; then
              echo "⚠️  $url → HTTP $STATUS"
              DEAD=1
            fi
          done
          if [ "$DEAD" -eq 0 ]; then
            echo "✅ All links reachable (or skipped as known placeholders)"
          fi

      - name: Markdown lint (structure check)
        run: |
          echo "=== Basic Markdown structure check ==="
          for f in templates/*.md README.md AGENTS.md; do
            if [ -f "$f" ]; then
              HEADERS=$(grep -c '^#' "$f" || true)
              echo "  $f: $HEADERS sections"
            fi
          done
          echo "✅ Markdown files have section headers"
