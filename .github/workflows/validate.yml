name: Validate and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check diff formatting
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"

      - name: Validate repository content
        run: python3 scripts/validate_repo.py

      - name: Check public links
        run: |
          mapfile -t URLS < <(grep -rhoE 'https?://[^"[:space:])>]+' site README.md AGENTS.md | sort -u)
          DEAD=0
          for url in "${URLS[@]}"; do
            STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" --retry 2 --connect-timeout 10 --max-time 30 "$url" || true)
            if [ "$STATUS" = "000" ] || [ "$STATUS" = "404" ] || [ "$STATUS" = "410" ] || { [ "$STATUS" -ge 500 ] && [ "$STATUS" != "999" ]; }; then
              echo "ERROR: $url returned HTTP $STATUS"
              DEAD=1
            else
              echo "OK: $url returned HTTP $STATUS"
            fi
          done
          exit "$DEAD"

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
